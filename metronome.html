<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Metronome</title>
<link rel="icon" type="image/svg+xml" href="icons/icon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0f0f1a;color:#d0d0d0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1.5rem;user-select:none}
h1{font-size:1.8rem;margin-bottom:1.5rem;color:#00d4aa}
h2{font-size:1.1rem;margin-bottom:.75rem;color:#88bbdd}
main{width:100%;max-width:560px}
#beat-display{display:flex;justify-content:center;gap:.75rem;margin-bottom:2rem;flex-wrap:wrap}
.beat-dot{width:50px;height:50px;border-radius:50%;background:#1e1e30;border:2px solid #333;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;color:#555;transition:all .06s}
.beat-dot.active{background:#00d4aa;border-color:#00d4aa;color:#0f0f1a;box-shadow:0 0 22px rgba(0,212,170,.5)}
.beat-dot.accent{background:#ff6b6b;border-color:#ff6b6b;box-shadow:0 0 22px rgba(255,107,107,.5)}
.panel{background:#161625;border-radius:12px;padding:1.25rem;margin-bottom:1.25rem}
.row{display:flex;align-items:center;gap:.75rem;margin-bottom:.85rem;flex-wrap:wrap}
.row:last-child{margin-bottom:0}
.row label{min-width:105px;font-size:.85rem;color:#999}
input[type=range]{flex:1;accent-color:#00d4aa;min-width:100px}
input[type=number]{width:68px;padding:.3rem .5rem;background:#0f0f1a;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:.95rem;text-align:center}
select{padding:.35rem .5rem;background:#0f0f1a;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:.95rem}
input[type=text]{flex:1;padding:.4rem .6rem;background:#0f0f1a;border:1px solid #333;border-radius:6px;color:#e0e0e0;font-size:.9rem}
.btn{padding:.5rem 1rem;background:#252540;border:1px solid #444;border-radius:8px;color:#d0d0d0;font-size:.85rem;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn:hover{background:#303050}
.btn:disabled{opacity:.35;cursor:default;pointer-events:none}
.btn-play{width:100%;padding:.8rem;background:#00d4aa;border:none;border-radius:10px;color:#0f0f1a;font-size:1.15rem;font-weight:700;cursor:pointer;transition:background .15s,transform .1s;letter-spacing:.3px}
.btn-play:hover{background:#00b894}
.btn-play:active{transform:scale(.98)}
.btn-play.playing{background:#ff6b6b}
.btn-play.playing:hover{background:#ee5a5a}
.btn-danger{border-color:#ff6b6b;color:#ff6b6b}
.btn-danger:hover{background:#3a1a1a}
.btn.on{background:#00d4aa;color:#0f0f1a;border-color:#00d4aa}
.btn.rec-on{background:#ff6b6b;color:#fff;border-color:#ff6b6b;animation:pulse-rec 1s infinite}
@keyframes pulse-rec{0%,100%{opacity:1}50%{opacity:.7}}
.status-text{margin-top:.5rem;font-size:.8rem;color:#777;min-height:1.2em}
.shortcuts{margin-top:.5rem}
.shortcuts ul{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:.35rem}
.shortcuts li{font-size:.78rem;color:#666}
kbd{display:inline-block;padding:.1rem .4rem;background:#252540;border:1px solid #444;border-radius:4px;font-family:monospace;font-size:.72rem;color:#00d4aa;margin-right:.25rem}
.hidden{display:none!important}
@media(max-width:480px){body{padding:1rem}h1{font-size:1.4rem}.beat-dot{width:40px;height:40px;font-size:.8rem}.shortcuts ul{grid-template-columns:1fr}.row label{min-width:80px}}
</style>
</head>
<body>

<h1>&#127925; Web Metronome</h1>

<main>
  <!-- Beat indicator -->
  <div id="beat-display"></div>

  <!-- Core controls -->
  <div class="panel">
    <div class="row">
      <label for="bpm-slider">BPM</label>
      <input type="range" id="bpm-slider" min="20" max="300" value="120">
      <input type="number" id="bpm-input" min="20" max="300" value="120">
    </div>
    <div class="row">
      <label>Time Sig</label>
      <select id="beats-per-measure">
        <option value="2">2</option><option value="3">3</option>
        <option value="4" selected>4</option><option value="5">5</option>
        <option value="6">6</option><option value="7">7</option>
        <option value="8">8</option><option value="9">9</option>
        <option value="12">12</option>
      </select>
      <span style="color:#666">/</span>
      <select id="beat-value">
        <option value="4" selected>4</option><option value="8">8</option>
      </select>
    </div>
    <div class="row">
      <label for="subdivisions">Subdivisions</label>
      <select id="subdivisions">
        <option value="1" selected>None</option>
        <option value="2">8ths</option>
        <option value="3">Triplets</option>
        <option value="4">16ths</option>
      </select>
    </div>
    <div class="row">
      <label style="min-width:0;flex:none">
        <input type="checkbox" id="accent-cb" checked> Accent beat 1
      </label>
    </div>
    <button id="play-btn" class="btn-play">&#9654; Play</button>
  </div>

  <!-- Tempo helpers -->
  <div class="panel">
    <div class="row">
      <button id="tap-tempo-btn" class="btn" style="flex:1">Tap Tempo</button>
      <button id="tap-ts-btn" class="btn" style="flex:1">Tap Time Sig</button>
    </div>
    <div class="status-text" id="tap-status"></div>
  </div>

  <!-- Tap-train recorder -->
  <div class="panel">
    <h2>Tap-Train Recorder</h2>
    <div class="row">
      <button id="rec-toggle-btn" class="btn">&#9899; Record</button>
      <button id="rec-tap-btn" class="btn" disabled>Tap!</button>
      <button id="rec-play-btn" class="btn" disabled>&#9654; Play</button>
      <button id="rec-export-btn" class="btn" disabled>Export</button>
    </div>
    <div class="status-text" id="rec-status"></div>
  </div>

  <!-- Presets -->
  <div class="panel">
    <h2>Presets</h2>
    <div class="row">
      <select id="preset-select" style="flex:1"><option value="">-- Select --</option></select>
      <button id="load-preset-btn" class="btn">Load</button>
      <button id="del-preset-btn" class="btn btn-danger">Del</button>
    </div>
    <div class="row">
      <input type="text" id="preset-name" placeholder="Preset name&hellip;">
      <button id="save-preset-btn" class="btn">Save</button>
    </div>
    <div class="row">
      <button id="export-presets-btn" class="btn" style="flex:1">Export All Presets</button>
      <button id="import-presets-btn" class="btn" style="flex:1">Import Presets</button>
      <input type="file" id="import-file" accept=".json" class="hidden">
    </div>
  </div>

  <!-- Keyboard shortcuts -->
  <div class="panel shortcuts">
    <h2>Keyboard Shortcuts</h2>
    <ul>
      <li><kbd>Space</kbd> Play / Stop</li>
      <li><kbd>&uarr;</kbd> <kbd>&darr;</kbd> BPM &plusmn;1</li>
      <li><kbd>Shift+&uarr;</kbd> <kbd>Shift+&darr;</kbd> BPM &plusmn;10</li>
      <li><kbd>T</kbd> Tap tempo</li>
      <li><kbd>G</kbd> Tap time sig</li>
      <li><kbd>R</kbd> Toggle recorder</li>
      <li><kbd>Space</kbd> Tap while recording</li>
      <li><kbd>A</kbd> Toggle accent</li>
    </ul>
  </div>
</main>

<script>
(function(){
"use strict";

/* ===== Audio context ===== */
var audioCtx=null;
function ctx(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended") audioCtx.resume();
  return audioCtx;
}

/* ===== State ===== */
var playing=false, bpm=120, beats=4, beatVal=4, subs=1, accent=true;
var curBeat=0, curSub=0, nextTime=0, timer=null;
var AHEAD=0.1, LOOK=25;

/* ===== DOM ===== */
var $=function(id){return document.getElementById(id)};
var bpmSlider=$("bpm-slider"), bpmNum=$("bpm-input");
var beatsSel=$("beats-per-measure"), bvSel=$("beat-value");
var subsSel=$("subdivisions"), accentCb=$("accent-cb");
var playBtn=$("play-btn"), beatDisp=$("beat-display");
var tapBtn=$("tap-tempo-btn"), tapTsBtn=$("tap-ts-btn"), tapStatus=$("tap-status");
var recToggle=$("rec-toggle-btn"), recTap=$("rec-tap-btn");
var recPlayBtn=$("rec-play-btn"), recExport=$("rec-export-btn"), recStatus=$("rec-status");
var presetSel=$("preset-select"), presetNm=$("preset-name");
var saveP=$("save-preset-btn"), loadP=$("load-preset-btn"), delP=$("del-preset-btn");
var expP=$("export-presets-btn"), impP=$("import-presets-btn"), impFile=$("import-file");

/* ===== Beat display ===== */
function buildDots(){
  beatDisp.innerHTML="";
  for(var i=0;i<beats;i++){
    var d=document.createElement("div");
    d.className="beat-dot"; d.textContent=i+1;
    beatDisp.appendChild(d);
  }
}
function lightDot(b){
  var dots=beatDisp.children;
  for(var i=0;i<dots.length;i++){
    dots[i].classList.remove("active","accent");
    if(i===b){
      dots[i].classList.add("active");
      if(i===0&&accent) dots[i].classList.add("accent");
    }
  }
}
function clearDots(){
  var dots=beatDisp.children;
  for(var i=0;i<dots.length;i++) dots[i].classList.remove("active","accent");
}

/* ===== Sound ===== */
function click(time,type){
  var c=ctx(), osc=c.createOscillator(), g=c.createGain();
  osc.connect(g); g.connect(c.destination);
  if(type==="accent"){
    osc.frequency.value=880; g.gain.setValueAtTime(1,time);
    g.gain.exponentialRampToValueAtTime(.001,time+.1);
    osc.start(time); osc.stop(time+.1);
  } else if(type==="beat"){
    osc.frequency.value=660; g.gain.setValueAtTime(.75,time);
    g.gain.exponentialRampToValueAtTime(.001,time+.08);
    osc.start(time); osc.stop(time+.08);
  } else {
    osc.frequency.value=440; g.gain.setValueAtTime(.3,time);
    g.gain.exponentialRampToValueAtTime(.001,time+.05);
    osc.start(time); osc.stop(time+.05);
  }
}

/* ===== Scheduler ===== */
function advance(){
  var spb=60/bpm, step=spb/subs;
  nextTime+=step;
  curSub++;
  if(curSub>=subs){curSub=0;curBeat++;if(curBeat>=beats)curBeat=0;}
}
function schedule(b,s,t){
  if(s===0){
    click(t,(b===0&&accent)?"accent":"beat");
    var d=(t-ctx().currentTime)*1000;
    setTimeout(function(){lightDot(b)},Math.max(0,d));
  } else {
    click(t,"sub");
  }
}
function loop(){
  while(nextTime<ctx().currentTime+AHEAD){schedule(curBeat,curSub,nextTime);advance();}
}
function start(){
  if(playing)return; ctx(); playing=true;
  curBeat=0;curSub=0;nextTime=audioCtx.currentTime+.05;
  timer=setInterval(loop,LOOK);
  playBtn.textContent="\u23F9 Stop"; playBtn.classList.add("playing");
}
function stop(){
  playing=false;clearInterval(timer);timer=null;
  playBtn.textContent="\u25B6 Play"; playBtn.classList.remove("playing");
  clearDots();
}
function toggle(){playing?stop():start();}

/* ===== Tap Tempo ===== */
var taps=[];
function tapTempo(){
  var now=performance.now(); taps.push(now);
  if(taps.length>8)taps.shift();
  if(taps.length>=2){
    var sum=0;
    for(var i=1;i<taps.length;i++) sum+=taps[i]-taps[i-1];
    var avg=sum/(taps.length-1), nb=Math.round(60000/avg);
    if(nb>=20&&nb<=300){bpm=nb;bpmSlider.value=bpm;bpmNum.value=bpm;}
    tapStatus.textContent="Detected "+bpm+" BPM";
  }
  clearTimeout(taps._t);
  taps._t=setTimeout(function(){taps=[];tapStatus.textContent="";},2500);
}

/* ===== Tap Time Sig ===== */
var tsActive=false, tsTaps=[], tsTimer=null;
function tapTimeSig(){
  if(!tsActive){
    tsActive=true; tsTaps=[];
    tapTsBtn.classList.add("on");
    tapStatus.textContent="Tap beats for one measure\u2026";
  }
  tsTaps.push(performance.now());
  clearTimeout(tsTimer);
  tsTimer=setTimeout(function(){
    if(tsTaps.length>=2&&tsTaps.length<=12){
      beats=tsTaps.length;
      beatsSel.value=beats;
      // Add option if not present
      if(!beatsSel.querySelector('option[value="'+beats+'"]')){
        var o=document.createElement("option");o.value=beats;o.textContent=beats;
        beatsSel.appendChild(o); beatsSel.value=beats;
      }
      buildDots();
      tapStatus.textContent="Time sig set to "+beats;
      if(playing){stop();start();}
    } else {
      tapStatus.textContent="Need 2\u201312 taps";
    }
    tsActive=false; tsTaps=[];
    tapTsBtn.classList.remove("on");
    setTimeout(function(){tapStatus.textContent="";},2000);
  },2000);
}

/* ===== Tap-Train Recorder ===== */
var recording=false, recTaps=[], recT0=0;
function recToggleFn(){
  if(!recording){
    recording=true; recTaps=[]; recT0=performance.now();
    recToggle.textContent="\u23F9 Stop"; recToggle.classList.add("rec-on");
    recTap.disabled=false; recPlayBtn.disabled=true; recExport.disabled=true;
    recStatus.textContent="Recording \u2014 tap or press Space\u2026";
  } else {
    recording=false;
    recToggle.textContent="\u26AB Record"; recToggle.classList.remove("rec-on");
    recTap.disabled=true;
    if(recTaps.length>=2){
      recPlayBtn.disabled=false; recExport.disabled=false;
      recStatus.textContent="Recorded "+recTaps.length+" taps";
    } else {
      recStatus.textContent="Need at least 2 taps";
    }
  }
}
function addRecTap(){
  if(!recording)return;
  recTaps.push(performance.now()-recT0);
  recStatus.textContent="Recording\u2026 "+recTaps.length+" taps";
  // flash button
  recTap.style.background="#00d4aa";recTap.style.color="#0f0f1a";
  setTimeout(function(){recTap.style.background="";recTap.style.color="";},100);
}
function playRec(){
  if(recTaps.length<2)return;
  var c=ctx(), base=c.currentTime, t0=recTaps[0];
  for(var i=0;i<recTaps.length;i++){
    click(base+(recTaps[i]-t0)/1000, i===0?"accent":"beat");
  }
}
function exportRec(){
  if(recTaps.length<2)return;
  var intervals=[];
  for(var i=1;i<recTaps.length;i++) intervals.push(Math.round(recTaps[i]-recTaps[i-1]));
  dlJSON({taps:recTaps.map(Math.round),intervals:intervals,
    count:recTaps.length,exportedAt:new Date().toISOString()},"tap-train-recording.json");
}

/* ===== Presets ===== */
var PK="webMetronomePresets";
function getPresets(){try{return JSON.parse(localStorage.getItem(PK))||{};}catch(e){return {};}}
function putPresets(p){localStorage.setItem(PK,JSON.stringify(p));fillPresets();}
function fillPresets(){
  var p=getPresets(), keys=Object.keys(p).sort();
  presetSel.innerHTML='<option value="">-- Select --</option>';
  keys.forEach(function(k){
    var o=document.createElement("option");o.value=k;o.textContent=k;presetSel.appendChild(o);
  });
}
function savePreset(){
  var n=presetNm.value.trim(); if(!n){alert("Enter a preset name.");return;}
  var p=getPresets();
  p[n]={bpm:bpm,beats:beats,beatVal:beatVal,subs:subs,accent:accent};
  putPresets(p); presetNm.value=""; presetSel.value=n;
}
function loadPreset(){
  var n=presetSel.value; if(!n)return;
  var d=getPresets()[n]; if(!d)return;
  bpm=d.bpm||120; beats=d.beats||4; beatVal=d.beatVal||4;
  subs=d.subs||1; accent=d.accent!==undefined?d.accent:true;
  bpmSlider.value=bpm; bpmNum.value=bpm;
  beatsSel.value=beats; bvSel.value=beatVal;
  subsSel.value=subs; accentCb.checked=accent;
  buildDots();
  if(playing){stop();start();}
}
function deletePreset(){
  var n=presetSel.value; if(!n)return;
  if(!confirm('Delete preset "'+n+'"?'))return;
  var p=getPresets(); delete p[n]; putPresets(p);
}
function exportPresets(){
  var p=getPresets();
  if(!Object.keys(p).length){alert("No presets to export.");return;}
  dlJSON(p,"metronome-presets.json");
}
function importPresets(){impFile.click();}
impFile.addEventListener("change",function(e){
  var f=e.target.files[0]; if(!f)return;
  var r=new FileReader();
  r.onload=function(ev){
    try{
      var d=JSON.parse(ev.target.result), p=getPresets();
      var count=0;
      for(var k in d){if(d.hasOwnProperty(k)&&d[k].bpm){p[k]=d[k];count++;}}
      putPresets(p); alert("Imported "+count+" preset(s).");
    }catch(err){alert("Invalid preset file.");}
  };
  r.readAsText(f); impFile.value="";
});

/* ===== Helpers ===== */
function dlJSON(obj,name){
  var b=new Blob([JSON.stringify(obj,null,2)],{type:"application/json"});
  var u=URL.createObjectURL(b), a=document.createElement("a");
  a.href=u; a.download=name; a.click(); URL.revokeObjectURL(u);
}

/* ===== Wiring ===== */
bpmSlider.oninput=function(){bpm=+this.value;bpmNum.value=bpm;};
bpmNum.onchange=function(){bpm=Math.min(300,Math.max(20,+this.value||120));this.value=bpm;bpmSlider.value=bpm;};
beatsSel.onchange=function(){beats=+this.value;buildDots();if(playing){stop();start();}};
bvSel.onchange=function(){beatVal=+this.value;};
subsSel.onchange=function(){subs=+this.value;if(playing){stop();start();}};
accentCb.onchange=function(){accent=this.checked;};
playBtn.onclick=toggle;
tapBtn.onclick=tapTempo;
tapTsBtn.onclick=tapTimeSig;
recToggle.onclick=recToggleFn;
recTap.onclick=addRecTap;
recPlayBtn.onclick=playRec;
recExport.onclick=exportRec;
saveP.onclick=savePreset;
loadP.onclick=loadPreset;
delP.onclick=deletePreset;
expP.onclick=exportPresets;
impP.onclick=importPresets;

/* ===== Keyboard ===== */
document.addEventListener("keydown",function(e){
  if(e.target.tagName==="INPUT"&&e.target.type!=="checkbox")return;
  switch(e.code){
    case"Space":
      e.preventDefault();
      if(recording){addRecTap();}else{toggle();}
      break;
    case"ArrowUp":
      e.preventDefault();
      bpm=Math.min(300,bpm+(e.shiftKey?10:1));
      bpmSlider.value=bpm;bpmNum.value=bpm;
      break;
    case"ArrowDown":
      e.preventDefault();
      bpm=Math.max(20,bpm-(e.shiftKey?10:1));
      bpmSlider.value=bpm;bpmNum.value=bpm;
      break;
    case"KeyT":if(!e.ctrlKey&&!e.metaKey)tapTempo();break;
    case"KeyG":if(!e.ctrlKey&&!e.metaKey)tapTimeSig();break;
    case"KeyR":if(!e.ctrlKey&&!e.metaKey)recToggleFn();break;
    case"KeyA":if(!e.ctrlKey&&!e.metaKey){accent=!accent;accentCb.checked=accent;}break;
  }
});

/* ===== Init ===== */
buildDots();
fillPresets();

})();
</script>
</body>
</html>
